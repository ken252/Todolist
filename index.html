<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles/style.css">
  <title>todolist</title>
</head>
<body>
  <div class="main-container">
   <div class="header-container">
        <span>toDo List</span>
    </div>
      <div class="input-container">
        <input class="todo-input" type="text" placeholder="type task">
        <input type="date" class="todo-date">
        <button class="add-button">add</button>
      </div>
    <div class="label-container">
        <div class="task-span-container">
          <span class="task-span">Task:</span>
        </div>
        <span class="date-span">Date:</span>
        <button class="delete-all-button">Delete All</button>
      </div>
    <div class="list-container">
      <p>No record</p>
    </div>
  </div>
  <script src="scripts/main.js"></script>
</body>
</html>
